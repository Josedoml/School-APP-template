<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management - Login</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|EB+Garamond&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #011f5b;
            --secondary: #900;
            --accent: #0066cc;
            --light-gray: #f5f5f5;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #0d3a8c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            gap: 15px;
        }

        .logo-image {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.2);
        }

        .logo-svg {
            width: 100%;
            height: 100%;
        }

        .logo-text {
            text-align: center;
        }

        .logo-text h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }

        .logo-text p {
            color: #666;
            font-size: 12px;
            margin: 5px 0 0 0;
        }

        h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, #0052a3 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 102, 204, 0.4);
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .toggle-text a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4caf50;
        }

        .form-section {
            display: block;
        }

        .form-section.hidden {
            display: none;
        }

        .role-select {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-btn {
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 500;
            font-size: 13px;
        }

        .role-btn:hover {
            border-color: var(--accent);
        }

        .role-btn.selected {
            border-color: var(--accent);
            background: rgba(0, 102, 204, 0.1);
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 30px 20px;
            }

            .logo-image {
                width: 80px;
                height: 80px;
            }

            .logo-text h1 {
                font-size: 24px;
            }

            h2 {
                font-size: 20px;
            }

            .role-select {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Logo Section -->
        <div class="logo-container">
            <div class="logo-image">
                <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- Outer circle background -->
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4DA6D6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    
                    <!-- Main circle background -->
                    <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" stroke="#4DA6D6" stroke-width="3"/>
                    
                    <!-- Decorative leaf elements -->
                    <g stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7">
                        <!-- Top leaves -->
                        <path d="M 100 15 Q 95 25 92 35" />
                        <path d="M 100 15 Q 105 25 108 35" />
                        <!-- Bottom leaves -->
                        <path d="M 100 185 Q 95 175 92 165" />
                        <path d="M 100 185 Q 105 175 108 165" />
                        <!-- Left leaves -->
                        <path d="M 15 100 Q 25 95 35 92" />
                        <path d="M 15 100 Q 25 105 35 108" />
                        <!-- Right leaves -->
                        <path d="M 185 100 Q 175 95 165 92" />
                        <path d="M 185 100 Q 175 105 165 108" />
                    </g>
                    
                    <!-- Center letter "S" -->
                    <text x="100" y="125" font-size="80" font-weight="900" fill="white" text-anchor="middle" font-family="Arial, sans-serif">S</text>
                </svg>
            </div>
            <div class="logo-text">
                <h1>School</h1>
                <p>Management System</p>
            </div>
        </div>

        <div id="alert"></div>

        <!-- Login Form -->
        <div id="login-form" class="form-section">
            <h2>Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="login-username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="forgot-password.html" style="color: var(--accent); text-decoration: none; font-weight: 500; font-size: 13px;">Forgot Password?</a>
                </div>
                <button type="submit">Login</button>
            </form>
            <div class="toggle-text">
                Don't have an account? <a onclick="toggleForm()">Register here</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-section hidden">
            <h2>Register</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="register-username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="register-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="register-password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label>Select Your Role:</label>
                    <div class="role-select">
                        <div class="role-btn selected" onclick="selectRole('student')">👨‍🎓 Student</div>
                        <div class="role-btn" onclick="selectRole('teacher')">👨‍🏫 Teacher</div>
                        <div class="role-btn" onclick="selectRole('admin')">⚙️ Admin</div>
                    </div>
                    <input type="hidden" id="selected-role" value="student">
                </div>
                <button type="submit">Register</button>
            </form>
            <div class="toggle-text">
                Already have an account? <a onclick="toggleForm()">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        function toggleForm() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('alert').innerHTML = '';
        }

        function selectRole(role) {
            document.getElementById('selected-role').value = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        function showAlert(message, type = 'error') {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
        }

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${username}&password=${password}`
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showAlert('Invalid username or password');
                }
            } catch (error) {
                showAlert('Error: ' + error.message);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const data = {
                username: document.getElementById('register-username').value,
                email: document.getElementById('register-email').value,
                password: document.getElementById('register-password').value,
                role: document.getElementById('selected-role').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('token', result.access_token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    showAlert('Registration successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    const error = await response.json();
                    showAlert(error.detail || 'Registration failed');
                }
            } catch (error) {
                showAlert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
